<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src https: data:; media-src https:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>WQXR Streamer</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">WQXR</div>
        <div class="stream-picker">
          <select id="stream-select" aria-label="Choose stream"></select>
        </div>
      </header>

      <section class="now" id="now">
        <div class="artwork">
          <img id="show-image" alt="" />
          <div class="artwork-fallback" id="artwork-fallback">♪</div>
        </div>

        <div class="show-name" id="show-name"></div>

        <div class="track" id="track">
          <div class="composer" id="track-composer"></div>
          <div class="title" id="track-title"></div>
          <div class="performers" id="track-performers"></div>
        </div>

        <a class="show-link" id="show-link" href="#" hidden>View on WQXR ↗</a>
      </section>

      <section class="controls">
        <button class="play" id="play-btn" aria-label="Play">
          <svg id="icon-play" viewBox="0 0 24 24" width="26" height="26"><path d="M8 5v14l11-7z" /></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" width="26" height="26" hidden><path d="M6 5h4v14H6zM14 5h4v14h-4z" /></svg>
        </button>

        <div class="volume">
          <button class="mute" id="mute-btn" aria-label="Mute">
            <svg id="icon-vol" viewBox="0 0 24 24" width="18" height="18"><path d="M3 9v6h4l5 5V4L7 9H3z" /></svg>
            <svg id="icon-muted" viewBox="0 0 24 24" width="18" height="18" hidden><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3l2.5-2.5-1-1L15.5 11 13 8.5l-1 1L14.5 12 12 14.5l1 1L15.5 13l2.5 2.5 1-1z" /></svg>
          </button>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" aria-label="Volume" />
        </div>

        <div class="status" id="status"></div>
      </section>

      <section class="history">
        <div class="history-head">Recently played</div>
        <ul class="history-list" id="history-list"></ul>
      </section>
    </main>

    <script src="ui.js"></script>
    <script src="player.js"></script>
  </body>
</html>
